<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Developer Login OTP</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f7fb;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            background: #ffffff;
            margin: auto;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #e6e6e6;
            text-align: center;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            color: #222;
        }

        .otp-box {
            margin: 25px 0;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 6px;
            color: #000;
            background: #f0f0f0;
            padding: 15px;
            border-radius: 6px;
        }

        .expiry {
            font-size: 14px;
            color: #666;
        }

        .footer {
            margin-top: 25px;
            font-size: 13px;
            color: #999;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="title">
        Developer Login Verification
    </div>

    <p>
        Use the OTP below to complete your login.
    </p>

    <div class="otp-box" th:text="${otp}">
        123456
    </div>

    <div class="expiry">
        This OTP will expire in <span th:text="${expiryMinutes}">5</span> minutes.
    </div>

    <div class="footer">
        If you did not request this login, you can safely ignore this email.
    </div>

</div>

</body>

</html>
