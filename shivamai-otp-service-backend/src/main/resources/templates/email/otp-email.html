<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>OTP Verification</title>

    <style>

        body{
        font-family: Arial, sans-serif;
        background:#f4f6f8;
        padding:20px;
        }

        .container{
        max-width:600px;
        background:#ffffff;
        margin:auto;
        padding:30px;
        border-radius:8px;
        border:1px solid #e5e5e5;
        text-align:center;
        }

        .logo{
        margin-bottom:20px;
        }

        .otp{
        font-size:32px;
        font-weight:bold;
        letter-spacing:6px;
        background:#f2f2f2;
        padding:15px;
        border-radius:6px;
        margin:20px 0;
        }

        .expiry{
        font-size:14px;
        color:#666;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="logo">
        <img src="cid:logoImage" width="120"/>
    </div>

    <h2>OTP Verification</h2>

    <p>Your verification code is:</p>

    <div class="otp" th:text="${otp}">123456</div>

    <p class="expiry">
        This OTP expires in
        <span th:text="${expiryMinutes}">5</span>
        minutes.
    </p>

    <p>If you did not request this OTP, you can ignore this email.</p>

</div>

</body>
</html>
