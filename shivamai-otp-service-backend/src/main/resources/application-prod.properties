# ======================================
# SERVER
# ======================================

server.port=${PORT:8080}

# Required for proper proxy / HTTPS forwarding
# behind Render + Cloudflare infrastructure
server.forward-headers-strategy=framework

# ======================================
# DATABASE CONFIGURATION
# ======================================

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# ======================================
# HIKARI CONNECTION POOL
# ======================================

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ======================================
# JPA / HIBERNATE
# ======================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# ======================================
# BREVO CONFIGURATION
# ======================================

brevo.api.key=${BREVO_API_KEY}

# ======================================
# JWT CONFIGURATION
# ======================================

shivamai.jwt.secret=${JWT_SECRET}
shivamai.jwt.expiration=86400000

# ======================================
# OTP CONFIGURATION
# ======================================

otp.expiry.seconds=300
otp.rate-limit.max-requests=30
otp.rate-limit.window-ms=60000

# ======================================
# APPLICATION MAIL
# ======================================

app.mail.from=shivamai.otp@gmail.com

# Dummy SMTP configuration required for
# Spring Mail bean initialization.
# Production email delivery uses
# Brevo REST API instead of SMTP.

spring.mail.host=localhost
spring.mail.port=25

# ======================================
# CORS CONFIGURATION
# ======================================

app.cors.allowed-origins=https://your-frontend.pages.dev